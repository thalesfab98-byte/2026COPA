let collection={},recent=[],currentView='album',filterMissing=false,albumSearch='',selectedSticker=null,selectedManual=null,cameraStream=null,facingMode='environment',currentAIMatch=null;
function loadState(){try{const s=localStorage.getItem('copa2026_v4');if(s){const d=JSON.parse(s);collection=d.collection||{};recent=d.recent||[];}}catch(e){collection={};recent=[];}}
function saveState(){localStorage.setItem('copa2026_v4',JSON.stringify({collection,recent}));}
function getCount(id){return(collection[id]||{}).count||0;}
function hasSticker(id){return getCount(id)>0;}
function isDuplicate(id){return getCount(id)>1;}
function totalHave(){return Object.keys(collection).filter(k=>collection[k].count>0).length;}
function totalDuplicates(){return Object.values(collection).reduce((a,v)=>a+Math.max(0,v.count-1),0);}
function totalMissing(){return ALL_STICKERS.length-totalHave();}
function totalPct(){return Math.round(totalHave()/ALL_STICKERS.length*100);}

function closeOnboarding(){document.getElementById('onboarding').style.display='none';localStorage.setItem('copa2026_onb','1');initApp();}
function checkOnboarding(){if(localStorage.getItem('copa2026_onb')){document.getElementById('onboarding').style.display='none';initApp();}}
function initApp(){loadState();renderAlbum();updateHeader();updateDupBadge();updateAIStatusDot();}

function updateHeader(){
  document.getElementById('h-total').textContent=totalHave();
  document.getElementById('h-missing').textContent=totalMissing();
  document.getElementById('h-dup').textContent=totalDuplicates();
  document.getElementById('h-pct').textContent=totalPct()+'%';
  document.getElementById('h-bar').style.width=totalPct()+'%';
}
function updateDupBadge(){const d=totalDuplicates(),b=document.getElementById('dup-badge');b.textContent=d;b.style.display=d>0?'flex':'none';}

function switchView(view,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  btn.classList.add('active');currentView=view;
  if(view==='duplicates')renderDuplicates();
  if(view==='stats')renderStats();
  if(view==='camera')startCamera();
  if(view!=='camera')stopCamera();
  if(view==='album')renderAlbum();
}

function filterAlbum(){albumSearch=document.getElementById('album-search').value.toLowerCase();renderAlbum();}
function toggleFilterMissing(){
  filterMissing=!filterMissing;
  document.getElementById('filter-missing-btn').classList.toggle('active',filterMissing);
  document.getElementById('filter-missing-btn').textContent=filterMissing?'🔴':'🔘';
  renderAlbum();
}

function renderAlbum(){
  const cont=document.getElementById('album-content');cont.innerHTML='';const q=albumSearch;
  let specs=SPECIAL.filter(s=>!q||(s.name.toLowerCase().includes(q)||s.num.toLowerCase().includes(q)));
  if(filterMissing)specs=specs.filter(s=>!hasSticker(s.id));
  if(specs.length){
    const hv=SPECIAL.filter(s=>hasSticker(s.id)).length;
    const sec=document.createElement('div');sec.className='group-section fade-in';
    sec.innerHTML=`<div class="group-header" onclick="toggleSection(this)"><span style="font-size:20px">⭐</span><span class="group-title">Especiais</span><span class="group-progress">${hv}/${SPECIAL.length}</span><span style="color:var(--text2);font-size:12px">▼</span></div><div class="special-grid" id="sec-SPECIAL"></div>`;
    cont.appendChild(sec);
    const grid=sec.querySelector('#sec-SPECIAL');
    specs.forEach(s=>{const cnt=getCount(s.id),cls=cnt>1?'duplicate':cnt===1?'have':'missing';
      const c2=document.createElement('div');c2.className=`special-chip ${cls}`;c2.onclick=()=>openStickerModal(s.id);
      c2.innerHTML=`${cnt>1?`<div class="dup-badge">x${cnt}</div>`:''}<div style="font-size:20px">${s.icon}</div><div style="font-size:8px;line-height:1.2;margin-top:2px">${s.name}</div><div style="font-size:7px;opacity:.5">${s.num}</div>`;
      grid.appendChild(c2);});
  }
  const groups=[...new Set(TEAMS.map(t=>t.group))];
  groups.forEach(g=>{
    const tg=TEAMS.filter(t=>t.group===g);
    const ag=tg.flatMap(t=>t.players.map(p=>({...p,id:`${t.id}-${p.num}`})));
    const hg=ag.filter(s=>hasSticker(s.id)).length;
    const sec=document.createElement('div');sec.className='group-section fade-in';
    sec.innerHTML=`<div class="group-header" onclick="toggleSection(this)"><span style="font-size:16px">🏆</span><span class="group-title">Grupo ${g}</span><span class="group-progress">${hg}/${ag.length}</span><span style="color:var(--text2);font-size:12px">▼</span></div><div class="group-body" id="sec-G${g}"></div>`;
    cont.appendChild(sec);
    const body=sec.querySelector(`#sec-G${g}`);
    tg.forEach(team=>{
      let players=team.players.map(p=>({...p,id:`${team.id}-${p.num}`}));
      if(q)players=players.filter(p=>p.name.toLowerCase().includes(q)||p.id.toLowerCase().includes(q));
      if(filterMissing)players=players.filter(p=>!hasSticker(p.id));
      if(!players.length)return;
      const ht=team.players.filter(p=>hasSticker(`${team.id}-${p.num}`)).length;
      const tt=team.players.length,pt=Math.round(ht/tt*100);
      const card=document.createElement('div');card.className='team-card';
      card.innerHTML=`<div class="team-header" onclick="toggleTeamStickers(this)"><div class="team-flag">${team.flag}</div><div class="team-info"><div class="team-name">${team.name}</div><div class="team-count">${ht}/${tt}</div></div><div style="font-size:11px;color:var(--text2)">${pt}%</div><div class="team-mini-bar"><div class="team-mini-fill" style="width:${pt}%"></div></div></div><div class="stickers-grid" style="display:none" id="tg-${team.id}"></div>`;
      body.appendChild(card);
      const grid=card.querySelector(`#tg-${team.id}`);
      players.forEach(p=>{const cnt=getCount(p.id),cls=cnt>1?'duplicate':cnt===1?'have':'missing',bc=p.type==='badge'?'badge-type':'';
        const ch=document.createElement('div');ch.className=`sticker-chip ${cls} ${bc}`;ch.onclick=()=>openStickerModal(p.id);
        const nm=p.name.length>12?p.name.substring(0,11)+'…':p.name;
        ch.innerHTML=`${cnt>1?`<div class="dup-badge">x${cnt}</div>`:cnt===1?'<div class="check-mark">✓</div>':''}<div class="sticker-icon">${p.icon||'⚽'}</div><div>${nm}</div><div class="sticker-num">${p.id}</div>`;
        grid.appendChild(ch);});
    });
  });
}
function toggleSection(el){const b=el.nextElementSibling,t=el.querySelector('span:last-child');t.textContent=b.classList.toggle('collapsed')?'▶':'▼';}
function toggleTeamStickers(el){const g=el.nextElementSibling;g.style.display=g.style.display==='none'?'grid':'none';}

function openStickerModal(id){
  const s=ALL_STICKERS.find(x=>x.id===id);if(!s)return;
  const cnt=getCount(id),status=cnt>1?'duplicate':cnt===1?'have':'missing';
  const stLbl=cnt>1?`Voce tem ${cnt} (${cnt-1} repetida${cnt>2?'s':''})`
    :cnt===1?'Na sua colecao':'Nao coletada ainda';
  document.getElementById('modal-sticker-big').innerHTML=`
    <div style="font-size:12px;color:var(--text2);margin-bottom:4px">${s.num}</div>
    <div class="modal-sticker-icon">${s.icon}</div>
    <div class="modal-sticker-name">${s.name}</div>
    <div class="modal-sticker-pos">${s.pos} ${s.flag||''} ${s.team}</div>
    <div class="modal-status-badge ${status}">${stLbl}</div>`;
  const actions=document.getElementById('modal-actions');
  actions.innerHTML=cnt===0
    ?`<button class="modal-btn primary" onclick="addSticker('${id}');closeStickerModal()">Marcar como coletada</button><button class="modal-btn secondary" onclick="closeStickerModal()">Fechar</button>`
    :`<button class="modal-btn primary" onclick="addSticker('${id}');closeStickerModal()">Adicionar repetida</button><button class="modal-btn danger" onclick="removeSticker('${id}');closeStickerModal()">Remover uma</button><button class="modal-btn secondary" onclick="closeStickerModal()">Fechar</button>`;
  document.getElementById('sticker-modal').classList.add('show');
}
function closeStickerModal(e){if(e&&e.target!==document.getElementById('sticker-modal'))return;document.getElementById('sticker-modal').classList.remove('show');}

function addSticker(id){
  if(!collection[id])collection[id]={count:0,addedAt:Date.now()};
  collection[id].count++;
  if(collection[id].count===1)collection[id].addedAt=Date.now();
  const s=ALL_STICKERS.find(x=>x.id===id);
  recent.unshift({id,name:s?s.name:id,team:s?s.team:'',at:Date.now()});
  if(recent.length>20)recent.pop();
  saveState();updateHeader();updateDupBadge();
  if(currentView==='album')renderAlbum();
  if(currentView==='duplicates')renderDuplicates();
  if(currentView==='stats')renderStats();
  const cnt=getCount(id);
  showToast(cnt===1?`${s?s.name:id} adicionada!`:`Repetida #${cnt-1} de ${s?s.name:id}`,cnt===1?'success':'info');
}
function removeSticker(id){
  if(!collection[id]||collection[id].count===0)return;
  collection[id].count--;
  saveState();updateHeader();updateDupBadge();
  if(currentView==='album')renderAlbum();
  if(currentView==='duplicates')renderDuplicates();
  const s=ALL_STICKERS.find(x=>x.id===id);
  showToast(`${s?s.name:id} removida`,'error');
}

async function startCamera(){
  document.getElementById('cam-live').style.display='block';
  document.getElementById('photo-review').classList.remove('show');
  document.getElementById('manual-add-panel').style.display='none';
  document.getElementById('cam-status').textContent='Iniciando camera...';
  try{
    if(cameraStream)cameraStream.getTracks().forEach(t=>t.stop());
    cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1280},height:{ideal:720}},audio:false});
    document.getElementById('cam-video').srcObject=cameraStream;
    document.getElementById('cam-status').textContent='Camera pronta';
  }catch(e){document.getElementById('cam-status').textContent='Sem camera — use adicionar manual';}
}
function stopCamera(){if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}}
async function switchCamera(){facingMode=facingMode==='environment'?'user':'environment';await startCamera();}

function capturePhoto(){
  const video=document.getElementById('cam-video'),canvas=document.getElementById('cam-canvas');
  if(!cameraStream||!video.videoWidth){showToast('Camera nao disponivel','error');return;}
  canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  stopCamera();
  const dataUrl=canvas.toDataURL('image/jpeg',0.85);
  document.getElementById('cam-live').style.display='none';
  document.getElementById('photo-review').classList.add('show');
  document.getElementById('photo-thumb').src=dataUrl;
  document.getElementById('sticker-search').style.display='none';
  document.getElementById('search-results').innerHTML='';
  document.getElementById('manual-confirm-row').style.display='none';
  selectedManual=null;
  processPhotoWithAI(dataUrl);
}
function retakePhoto(){document.getElementById('photo-review').classList.remove('show');startCamera();}

  stopCamera();
  document.getElementById('cam-live').style.display='none';
  document.getElementById('photo-review').classList.remove('show');

function showAIPanel(mode){
  document.getElementById('ai-loading').style.display=mode==='loading'?'block':'none';
  document.getElementById('ai-result').style.display=mode==='result'?'block':'none';
  document.getElementById('ai-nokey').style.display=mode==='nokey'?'block':'none';
  document.getElementById('ai-error').style.display=mode==='error'?'block':'none';
}

async function processPhotoWithAI(dataUrl){
  const apiKey=localStorage.getItem('copa2026_gemini_key');
  if(!apiKey){showAIPanel('nokey');return;}
  showAIPanel('loading');
  try{
    const base64=dataUrl.split(',')[1];
    const aiResult=await callGeminiVision(base64);
    const matches=findStickerMatch(aiResult);
    showAIMatchResult(aiResult,matches);
  }catch(e){
    showAIPanel('error');
    document.getElementById('ai-error-msg').textContent=e.message||'Erro — tente busca manual';
  }
}

async function callGeminiVision(base64img){
  const apiKey=localStorage.getItem('copa2026_gemini_key');
  const playerList=ALL_STICKERS.filter(s=>s.type!=='badge'&&s.teamId!=='SPECIAL')
    .map(s=>`${s.name} - ${s.team} [${s.id}]`).join('\n');
  const prompt=`You are analyzing a Panini World Cup 2026 sticker photo.\n\nPlayers in the album:\n${playerList}\n\nIdentify the player and return ONLY valid JSON:\n{"player":"Full Name","team":"Team","sticker_id":"XXX-00","confidence":0.0}\n\nIf team badge/crest: {"player":"Distintivo","team":"Team","sticker_id":"XXX-01","confidence":0.9}\nIf cannot identify: {"player":null,"team":null,"sticker_id":null,"confidence":0}`;
  const res=await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
    {method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:'image/jpeg',data:base64img}}]}],
    generationConfig:{temperature:0.1,maxOutputTokens:300}})}
  );
  if(!res.ok){const err=await res.json();throw new Error(err.error?.message||`Erro HTTP ${res.status}`);}
  const data=await res.json();
  const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
  const m=text.match(/\{[\s\S]*?\}/);
  if(!m)throw new Error('Resposta invalida da IA');
  return JSON.parse(m[0]);
}

function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').trim();}
function findStickerMatch(ai){
  if(!ai)return[];const res=[];
  if(ai.sticker_id){const d=ALL_STICKERS.find(s=>s.id===ai.sticker_id);if(d)res.push({...d,score:10});}
  if(ai.player&&ai.player!=='null'){
    const pn=norm(ai.player),tn=norm(ai.team||''),pw=pn.split(' ').filter(w=>w.length>2);
    ALL_STICKERS.forEach(s=>{
      if(res.find(r=>r.id===s.id))return;
      const sn=norm(s.name),st=norm(s.team);let sc=0;
      if(sn===pn)sc+=9;else if(sn.includes(pn)||pn.includes(sn))sc+=6;
      else{const sw=sn.split(' ');pw.forEach(w=>{if(sw.some(x=>x.includes(w)||w.includes(x)))sc+=2;});}
      if(tn&&(st.includes(tn)||tn.includes(st)))sc+=2;
      if(sc>3)res.push({...s,score:sc});
    });
  }
  return res.sort((a,b)=>b.score-a.score).slice(0,5);
}

function showAIMatchResult(ai,matches){
  showAIPanel('result');
  const top=matches[0];
  const conf=Math.round((ai.confidence||0)*100);
  document.getElementById('ai-conf').textContent=conf+'%';
  if(top){
    currentAIMatch=top.id;
    const cnt=getCount(top.id);
    document.getElementById('ai-flag').textContent=top.flag||top.icon||'⚽';
    document.getElementById('ai-name').textContent=top.name;
    document.getElementById('ai-detail').textContent=`${top.num} • ${top.team} • ${top.pos}${cnt>0?' • JÁ COLETADA':''}`;
    const cb=document.getElementById('ai-confirm-btn');
    if(cnt>0){cb.textContent='Adicionar como Repetida';cb.style.background='linear-gradient(135deg,#FFA500,#FF6B00)';}
    else{cb.textContent='Confirmar e Adicionar';cb.style.background='linear-gradient(135deg,var(--gold),var(--gold2))';}
    cb.disabled=false;
    const others=matches.slice(1,4);
    if(others.length){
      document.getElementById('ai-others').style.display='block';
      const list=document.getElementById('ai-others-list');list.innerHTML='';
      others.forEach(s=>{
        const el=document.createElement('div');
        el.style.cssText='display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:8px;cursor:pointer;margin-bottom:4px;touch-action:manipulation';
        el.innerHTML=`<span style="font-size:18px">${s.flag||s.icon}</span><div style="flex:1"><div style="font-size:12px;font-weight:600">${s.name}</div><div style="font-size:10px;color:var(--text2)">${s.num} • ${s.team}</div></div>`;
        el.onclick=()=>{currentAIMatch=s.id;document.getElementById('ai-flag').textContent=s.flag||s.icon;document.getElementById('ai-name').textContent=s.name;document.getElementById('ai-detail').textContent=`${s.num} • ${s.team}`;document.getElementById('ai-others').style.display='none';showToast('Selecionado: '+s.name,'info');};
        list.appendChild(el);
      });
    }
  }else{
    currentAIMatch=null;
    document.getElementById('ai-flag').textContent='❓';
    document.getElementById('ai-name').textContent='Nao identificado';
    document.getElementById('ai-detail').textContent=ai.player?`IA detectou: "${ai.player}" — nao encontrado`:'Figurinha nao reconhecida';
    document.getElementById('ai-confirm-btn').disabled=true;
  }
}

function confirmAIMatch(){
  if(!currentAIMatch)return;
  addSticker(currentAIMatch);currentAIMatch=null;
  document.getElementById('photo-review').classList.remove('show');
  showAIPanel('');startCamera();
}
function confirmManualAdd(mode){
  const id=mode==='manual'?selectedManual:selectedManual;
  if(!id)return;
  addSticker(id);selectedManual=null;
  if(mode==='manual'){hideManualAdd();}
  else{document.getElementById('photo-review').classList.remove('show');startCamera();}
}

function searchSticker(q,cid='search-results'){
  const cont=document.getElementById(cid);
  const isMain=cid==='search-results';
  const btn=document.getElementById(isMain?'confirm-add-btn':'manual-add-btn');
  selectedManual=null;if(btn)btn.disabled=true;cont.innerHTML='';
  if(!q.trim())return;
  const ql=q.toLowerCase().trim();
  const res=ALL_STICKERS.filter(s=>s.name.toLowerCase().includes(ql)||s.id.toLowerCase().includes(ql)||(s.team&&s.team.toLowerCase().includes(ql))).slice(0,12);
  if(!res.length){cont.innerHTML='<div style="text-align:center;padding:12px;color:var(--text2);font-size:13px">Nenhuma figurinha encontrada</div>';return;}
  res.forEach(s=>{
    const cnt=getCount(s.id),stxt=cnt>1?`x${cnt}`:cnt===1?'Tenho':'Falta';
    const item=document.createElement('div');item.className='search-result-item';
    item.innerHTML=`<div class="sri-flag">${s.flag||s.icon}</div><div class="sri-info"><div class="sri-name">${s.name}</div><div class="sri-detail">${s.num} - ${s.team}</div></div><div class="sri-status ${cnt>0?'have':'missing'}">${stxt}</div>`;
    item.onclick=()=>{cont.querySelectorAll('.search-result-item').forEach(el=>el.classList.remove('selected'));item.classList.add('selected');selectedManual=s.id;if(btn)btn.disabled=false;};
    cont.appendChild(item);
  });
}

function renderDuplicates(){
  const dups=ALL_STICKERS.filter(s=>isDuplicate(s.id));
  const list=document.getElementById('dup-list'),summ=document.getElementById('dup-summary');
  list.innerHTML='';
  if(!dups.length){summ.textContent='';list.innerHTML='<div class="empty-state"><div class="empty-icon">🎴</div><div>Nenhuma repetida ainda!</div></div>';return;}
  const tot=dups.reduce((a,s)=>a+(getCount(s.id)-1),0);
  summ.textContent=`${dups.length} figurinha${dups.length>1?'s':''} com repeticao • ${tot} repetida${tot>1?'s':''} no total`;
  dups.sort((a,b)=>getCount(b.id)-getCount(a.id));
  dups.forEach(s=>{
    const cnt=getCount(s.id),item=document.createElement('div');item.className='dup-item';
    item.innerHTML=`<div class="dup-flag">${s.flag||s.icon}</div><div class="dup-info"><div class="dup-name">${s.name}</div><div class="dup-team">${s.num} - ${s.team}</div></div><div class="dup-count-ctrl"><button class="dup-minus" onclick="removeSticker('${s.id}')">-</button><div class="dup-count">${cnt}</div><button class="dup-plus" onclick="addSticker('${s.id}')">+</button></div>`;
    list.appendChild(item);
  });
}

function renderStats(){
  const h=totalHave(),m=totalMissing(),d=totalDuplicates(),p=totalPct();
  document.getElementById('stats-cards').innerHTML=`
    <div class="stat-card"><div class="stat-val green">${h}</div><div style="font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px">Coletadas</div></div>
    <div class="stat-card"><div class="stat-val red">${m}</div><div style="font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px">Faltando</div></div>
    <div class="stat-card"><div class="stat-val gold">${d}</div><div style="font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px">Repetidas</div></div>
    <div class="stat-card"><div class="stat-val blue">${ALL_STICKERS.length}</div><div style="font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px">Total Album</div></div>
    <div class="stat-card wide" style="text-align:left;padding:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:700">Progresso Geral</span><span style="font-size:20px;font-weight:900;color:var(--gold)">${p}%</span></div>
      <div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:${p}%"></div></div>
      <div style="margin-top:6px;font-size:11px;color:var(--text2)">${h} de ${ALL_STICKERS.length} figurinhas</div>
    </div>`;
  const tpl=document.getElementById('team-progress-list');tpl.innerHTML='';
  TEAMS.map(t=>{const tot=t.players.length,hv=t.players.filter(p=>hasSticker(`${t.id}-${p.num}`)).length;return{...t,tot,hv,pct:Math.round(hv/tot*100)};}).sort((a,b)=>b.pct-a.pct)
  .forEach(t=>{const item=document.createElement('div');item.className='tpl-item';
    item.innerHTML=`<div class="tpl-top"><div class="tpl-flag">${t.flag}</div><div class="tpl-name">${t.name}</div><div class="tpl-pct">${t.pct}%</div></div><div class="tpl-bar"><div class="tpl-fill" style="width:${t.pct}%"></div></div>`;
    tpl.appendChild(item);});
  const rl=document.getElementById('recent-list');rl.innerHTML='';
  if(!recent.length){rl.innerHTML='<div class="empty-state"><div class="empty-icon">📷</div><div>Adicione figurinhas para ver o historico</div></div>';return;}
  recent.slice(0,10).forEach(r=>{const s=ALL_STICKERS.find(x=>x.id===r.id);
    const item=document.createElement('div');item.className='recent-item';
    const mins=Math.floor((Date.now()-r.at)/60000);
    const t=mins<1?'agora':mins<60?mins+'min':Math.floor(mins/60)+'h';
    item.innerHTML=`<div class="recent-dot"></div><div style="flex:1"><div class="recent-name">${s?s.flag||s.icon:''} ${r.name}</div><div class="recent-time">${r.team} • ${t} atras</div></div>`;
    rl.appendChild(item);});
}

function buildDupText(){
  const dups=ALL_STICKERS.filter(s=>isDuplicate(s.id));
  if(!dups.length)return 'Nenhuma repetida';
  return 'COPA 2026 - Repetidas\n\n'+dups.map(s=>`- ${s.num} ${s.name} (${s.team}) x${getCount(s.id)-1}`).join('\n');
}
function showShareModal(){document.getElementById('share-modal').classList.add('show');}
function closeShareModal(e){if(e&&e.target!==document.getElementById('share-modal'))return;document.getElementById('share-modal').classList.remove('show');}
function exportText(){const b=new Blob([buildDupText()],{type:'text/plain'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='repetidas.txt';a.click();closeShareModal();}
function exportCSV(){
  const dups=ALL_STICKERS.filter(s=>isDuplicate(s.id));
  let csv='Numero,Nome,Selecao,Repetidas\n';dups.forEach(s=>{csv+=`"${s.num}","${s.name}","${s.team}",${getCount(s.id)-1}\n`;});
  const b=new Blob([csv],{type:'text/csv'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='repetidas.csv';a.click();closeShareModal();
}
function shareWhatsApp(){window.open(`https://wa.me/?text=${encodeURIComponent(buildDupText())}`,'_blank');closeShareModal();}
function copyToClipboard(){navigator.clipboard.writeText(buildDupText()).then(()=>showToast('Copiado!','success'));closeShareModal();}

function openSettings(){
  const key=localStorage.getItem('copa2026_gemini_key')||'';
  document.getElementById('gemini-key-input').value=key;
  checkKeyFormat(key);updateAIStatusDot();
  document.getElementById('key-test-result').style.display='none';
  document.getElementById('settings-modal').classList.add('show');
}
function closeSettings(e){if(e&&e.target!==document.getElementById('settings-modal'))return;document.getElementById('settings-modal').classList.remove('show');}
function saveApiKey(){
  const key=document.getElementById('gemini-key-input').value.trim();
  if(key.length<20){showToast('Chave muito curta','error');return;}
  localStorage.setItem('copa2026_gemini_key',key);
  updateAIStatusDot();closeSettings();
  showToast('IA ativada com sucesso!','success');
}
function checkKeyFormat(val){
  const hint=document.getElementById('key-hint');
  if(!val){hint.textContent='';return;}
  if(val.length>=20){hint.textContent='✅ Formato valido';hint.style.color='var(--green)';}
  else{hint.textContent='⚠️ Chave muito curta';hint.style.color='var(--red)';}
}
function updateAIStatusDot(){
  const dot=document.getElementById('ai-status-dot');
  if(!dot)return;
  dot.style.background=localStorage.getItem('copa2026_gemini_key')?'var(--green)':'var(--text2)';
}

let toastTimer;
function showToast(msg,type='info'){
  const t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className='',3000);
}

window.addEventListener('load',checkOnboarding);
window.addEventListener('beforeunload',stopCamera);
</script>
</body>
</html>
